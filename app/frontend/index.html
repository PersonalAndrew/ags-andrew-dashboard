<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SofaScore Player Dashboard</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>SofaScore Player Dashboard</h1>
            <p>Performance & Estatísticas Detalhadas</p>
            <div class="player-selector">
                <select id="player-select" disabled>
                    <option value="">Carregando jogadores...</option>
                </select>
                <div id="player-info" class="player-info"></div>
            </div>
        </header>

        <main>
            <div class="glass-panel map-container">
                <h2>Mapa de Calor (Heatmap)</h2>
                <div class="img-wrapper">
                    <img id="heatmap-img" src="" alt="Heatmap loading...">
                </div>
            </div>

            <div class="glass-panel map-container">
                <h2>Mapa de Chutes (Shotmap)</h2>
                <div class="img-wrapper">
                    <img id="shotmap-img" src="" alt="Shotmap loading...">
                </div>
            </div>

            <div class="glass-panel map-container">
                <h2>Mapa de Passes</h2>
                <div class="img-wrapper">
                    <img id="passmap-img" src="" alt="Passmap loading...">
                </div>
            </div>

            <div class="glass-panel stats-container">
                <h2>Estatísticas Gerais</h2>
                <div id="stats-grid" class="stats-grid"></div>
            </div>

            <div class="glass-panel radar-container">
                <h2>Radar de Performance</h2>
                <canvas id="stats-radar"></canvas>
            </div>
        </main>
    </div>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
